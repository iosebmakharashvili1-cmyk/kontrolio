services:
  web:
    image: nginx:alpine
    container_name: kontrolio-web
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    build: ./api
    container_name: kontrolio-api
    restart: unless-stopped
    env_file:
      - ./api/.env
    volumes:
      - ./api/data:/app/data
    expose:
      - "3000"
