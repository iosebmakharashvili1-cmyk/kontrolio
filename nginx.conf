server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- gzip (ვრცელდება სტატიკურ ფაილებზეც და /api/-ის JSON-ზეც) ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # სტატიკური საიტი
    location / {
        try_files $uri $uri/ =404;

        # "no-cache" ნამდვილად არ ნიშნავს "არ დაკეშო" — ბრაუზერი ფაილს დაკეშავს,
        # მაგრამ ყოველ ჯერზე სერვერს ჩაუკითხავს (ETag-ით), შეიცვალა თუ არა.
        # თუ არა — 304 (ხელახლა ჩამოტვირთვის გარეშე); თუ შეიცვალა — ახალი ვერსია
        # ავტომატურად მოვა, hard-refresh საჭირო არ იქნება.
        add_header Cache-Control "no-cache" always;

        # უსაფრთხოების header-ები — მხოლოდ სტატიკურ საიტზე (არა /api/-ზე,
        # სადაც ეს იგივე Helmet-მა უკვე დააწესა — წინააღმდეგ შემთხვევაში
        # ორმაგი/კონფლიქტური header-ები გამოვა).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://unpkg.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
    }

    # backend API — იმავე origin-ზე, რომ CORS-ის საჭიროება არ იყოს.
    # Cache-Control/security headers აქ არ ვამატებთ — Express/Helmet-ი
    # ამას თავადვე უმკლავდება, ნუ დავადუბლირებთ.
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
