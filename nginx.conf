server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ---------- უსაფრთხოების header-ები ----------
    # script-src შეგნებულად არ შეიცავს 'unsafe-inline' — ანუ თუ რომელიმე
    # feed-ში მომავალში ისევ unescaped მონაცემი გაჟონავს, injected <script>
    # ან onerror= ბრაუზერი დაბლოკავს. style-src-ში 'unsafe-inline' დავტოვე
    # შეგნებულად — Leaflet/inline style-ის რისკი დაბალია, სარგებელი მცირეა.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org https://unpkg.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    # სტატიკური საიტი
    location / {
        try_files $uri $uri/ =404;
    }

    # backend API — იმავე origin-ზე, რომ CORS-ის საჭიროება არ იყოს
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
